name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ci-cargo-v3-${{ hashFiles('**/Cargo.lock') }}

      # Diagnostic: check shm-rs independently first
      - name: Check shm-rs
        run: cargo check -p shm-rs --lib -vv 2>&1 | tail -50

      # engram, notebook-rs, and forge depend on llama-cpp-sys-2 which needs
      # cmake + C++ toolchain. Exclude them from Ubuntu CI; Windows CI builds all.
      - name: Check compilation
        run: cargo check --workspace --exclude engram --exclude notebook-rs --exclude forge --all-targets

      - name: Clippy lints
        run: cargo clippy --workspace --exclude engram --exclude notebook-rs --exclude forge --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --exclude engram --exclude notebook-rs --exclude forge --lib

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify installer modules import
        run: |
          cd ${{ github.workspace }}
          python -c "from installer import manifest; print('manifest OK')"
          python -c "from installer import remote; print('remote OK')"
          python -c "from installer import binaries; print('binaries OK')"
          python -c "from installer import preflight; print('preflight OK')"
          python -c "from installer import platform; print('platform OK')"
          python -c "from installer import verify; print('verify OK')"
          python -c "from installer import ui; print('ui OK')"

      - name: Verify scripts compile
        run: |
          python -m py_compile install.py
          python -m py_compile update.py
          python -m py_compile sign.py
          python -m py_compile packaging/release.py
          echo "All scripts compile OK"

      - name: Syntax check install.sh
        run: bash -n install.sh

      - name: Verify sign.py help
        run: python sign.py --help

      - name: Verify update.py help
        run: python update.py --help

  rust-build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ci-windows-cargo-v2-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (Windows)
        run: cargo build --release

      - name: Run tests
        run: cargo test --lib
