name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Strip runner-specific paths (C:\Users\runneradmin\..., workspace path) from
      # embedded debug strings, panic locations, and dep-info. rustc's strip=true
      # only removes debug symbols; path literals via file!()/include_str! survive
      # unless remapped at compile time.
      # LLAMA_CPP_PATH_REMAP is read by the workspace llama-cpp-sys-2 build.rs,
      # which passes /d1trimfile (MSVC) or -ffile-prefix-map (clang/gcc) so that
      # __FILE__ baked into llama.cpp's C/C++ objects doesn't leak the path.
      - name: Build release binaries
        shell: pwsh
        run: |
          $env:RUSTFLAGS = "--remap-path-prefix=$pwd=. --remap-path-prefix=$env:USERPROFILE\.cargo=/cargo --remap-path-prefix=$env:USERPROFILE\.rustup=/rustup"
          $env:LLAMA_CPP_PATH_REMAP = "$pwd"
          # Default-features build produces forge.exe (API-only, no llama.cpp).
          cargo build --release --workspace --bins
          Copy-Item "target/release/forge.exe" "target/release/forge-api.exe"
          # Rebuild forge with local-llm to produce the llama.cpp-linked variant.
          cargo build --release -p forge --features local-llm
          Copy-Item "target/release/forge.exe" "target/release/forge-local.exe"
          Copy-Item "target/release/forge-api.exe" "target/release/forge.exe" -Force

      - name: Collect binaries
        shell: pwsh
        run: |
          $version = (Get-Content version.txt).Trim()
          $outDir = "staging/ai-foundation-v$version/bin"
          New-Item -ItemType Directory -Path $outDir -Force
          $required = @(
            "notebook-cli", "teambook-engram", "session-start",
            "v2-daemon", "teamengram-daemon", "ai-foundation-mcp", "forge", "forge-local"
          )
          foreach ($bin in $required) {
            $src = "target/release/$bin.exe"
            if (-not (Test-Path $src)) {
              throw "Missing required binary: $src"
            }
            Copy-Item $src "$outDir/$bin.exe"
            Write-Host "Collected: $bin.exe"
          }

      - name: Generate manifest
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: |
          $version = (Get-Content version.txt).Trim()
          python sign.py --bin-dir "staging/ai-foundation-v$version/bin"

      - name: Create archive
        shell: pwsh
        run: |
          $version = (Get-Content version.txt).Trim()
          Compress-Archive -Path "staging/*" -DestinationPath "ai-foundation-v$version-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ai-foundation-v*-windows-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: |
          export RUSTFLAGS="--remap-path-prefix=$PWD=. --remap-path-prefix=$HOME/.cargo=/cargo --remap-path-prefix=$HOME/.rustup=/rustup"
          export LLAMA_CPP_PATH_REMAP="$PWD"
          cargo build --release --workspace --bins
          cp target/release/forge target/release/forge-api
          cargo build --release -p forge --features local-llm
          cp target/release/forge target/release/forge-local
          cp target/release/forge-api target/release/forge

      - name: Collect and package
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          STAGING="staging/ai-foundation-v${VERSION}"
          mkdir -p "$STAGING"
          for bin in notebook-cli teambook-engram session-start v2-daemon teamengram-daemon ai-foundation-mcp forge forge-local; do
            src="target/release/${bin}"
            if [ ! -f "$src" ]; then
              echo "Missing required binary: $src" >&2
              exit 1
            fi
            cp "$src" "$STAGING/"
            chmod +x "$STAGING/$bin"
            echo "Collected: $bin"
          done
          python3 sign.py --bin-dir "$STAGING"
          tar -czf "ai-foundation-v${VERSION}-linux-x64.tar.gz" -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: ai-foundation-v*-linux-x64.tar.gz

  build-macos:
    # macOS builds are best-effort — sem_timedwait not available on Darwin
    continue-on-error: true
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: aarch64
          - runner: macos-14
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: |
          export RUSTFLAGS="--remap-path-prefix=$PWD=. --remap-path-prefix=$HOME/.cargo=/cargo --remap-path-prefix=$HOME/.rustup=/rustup"
          export LLAMA_CPP_PATH_REMAP="$PWD"
          cargo build --release --workspace --bins
          cp target/release/forge target/release/forge-api
          cargo build --release -p forge --features local-llm
          cp target/release/forge target/release/forge-local
          cp target/release/forge-api target/release/forge

      - name: Collect and package
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          STAGING="staging/ai-foundation-v${VERSION}"
          mkdir -p "$STAGING"
          # macOS is best-effort (continue-on-error on this job); skip missing bins rather than fail.
          for bin in notebook-cli teambook-engram session-start v2-daemon teamengram-daemon ai-foundation-mcp forge forge-local; do
            src="target/release/${bin}"
            if [ -f "$src" ]; then
              cp "$src" "$STAGING/"
              chmod +x "$STAGING/$bin"
              echo "Collected: $bin"
            else
              echo "Skipped (missing): $bin"
            fi
          done
          python3 sign.py --bin-dir "$STAGING"
          tar -czf "ai-foundation-v${VERSION}-macos-${{ matrix.arch }}.tar.gz" -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: ai-foundation-v*-macos-${{ matrix.arch }}.tar.gz

  publish:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate release manifest
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

          # Generate SHA256 checksums
          cd dist
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec mv {} . \;
          sha256sum ai-foundation-v* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AI-Foundation v${{ env.VERSION }}"
          body: |
            ## AI-Foundation v${{ env.VERSION }}

            ### Install

            **One-line install:**
            ```bash
            # Linux / macOS
            curl -fsSL https://github.com/QD25565/ai-foundation/raw/main/install.sh | bash

            # Windows (PowerShell)
            irm https://github.com/QD25565/ai-foundation/raw/main/install.ps1 | iex
            ```

            **Package managers:**
            ```bash
            # Scoop (Windows)
            scoop bucket add ai-foundation https://github.com/QD25565/ai-foundation
            scoop install ai-foundation

            # Homebrew (macOS/Linux)
            brew install QD25565/tap/ai-foundation
            ```

            ### Checksums
            See `checksums-sha256.txt` for SHA256 hashes of all archives.
          files: |
            dist/ai-foundation-v*-windows-x64.zip
            dist/ai-foundation-v*-linux-x64.tar.gz
            dist/ai-foundation-v*-macos-aarch64.tar.gz
            dist/ai-foundation-v*-macos-x64.tar.gz
            dist/checksums-sha256.txt
          draft: false
          prerelease: false

      - name: Update Scoop manifest
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          HASH=$(sha256sum dist/ai-foundation-v${VERSION}-windows-x64.zip | cut -d' ' -f1)
          python3 -c "
          import json
          m = json.load(open('packaging/scoop/ai-foundation.json'))
          m['version'] = '${VERSION}'
          m['architecture']['64bit']['hash'] = '${HASH}'
          m['architecture']['64bit']['url'] = 'https://github.com/QD25565/ai-foundation/releases/download/v${VERSION}/ai-foundation-v${VERSION}-windows-x64.zip'
          json.dump(m, open('packaging/scoop/ai-foundation.json', 'w'), indent=4)
          "

      - name: Commit manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/scoop/ai-foundation.json
          git diff --cached --quiet || git commit -m "chore: update scoop manifest for v${{ env.VERSION }}"
          git push origin HEAD:main || true
