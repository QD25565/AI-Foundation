[package]
name = "visionbook-rs"
version = "1.0.0"
edition = "2021"
authors = ["AI Foundation Team"]
description = "High-performance visual tools for AI agents - screenshots, browser automation, video recording"

[[bin]]
name = "visionbook"
path = "src/bin/visionbook-cli.rs"

[lib]
name = "visionbook_core"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
# Async runtime (match AI-Foundation)
tokio = { version = "1.35", features = ["full"] }

# Browser automation - Chrome DevTools Protocol
chromiumoxide = { version = "0.7", features = ["tokio-runtime"] }

# Screenshots - cross-platform
xcap = "0.7"

# CLI
clap = { version = "4.5", features = ["derive"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Image processing
image = "0.25"

# Futures utilities
futures = "0.3"

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# Filesystem paths
dirs = "5.0"

# Temporary files for testing
tempfile = "3.10"

[features]
default = []
video = []  # Enable video recording features

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
