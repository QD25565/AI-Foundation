[package]
name = "presence-rs"
version = "1.0.0"
edition = "2021"
authors = ["AI Foundation Team"]
description = "High-performance presence heartbeat system for AI coordination"

[lib]
name = "presence_rs"
path = "src/lib.rs"
crate-type = ["lib", "cdylib"]

[[bin]]
name = "presence-cli"
path = "src/bin/presence-cli.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
redis = { version = "0.24", features = ["tokio-comp", "connection-manager"] }
tokio = { version = "1.42", features = ["full"] }
futures-util = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
pyo3 = { version = "0.22", features = ["extension-module"], optional = true }

[features]
default = []
python = ["pyo3"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
