[package]
name = "ai-foundation-gateway"
version = "0.1.0"
edition = "2021"
description = "Universal HTTP Gateway for AI-Foundation - Any AI, Anywhere, Connected"

[[bin]]
name = "gateway"
path = "src/main.rs"

[dependencies]
# Web framework
axum = { version = "0.7", features = ["ws", "macros"] }
axum-extra = { version = "0.9", features = ["typed-header"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace", "compression-gzip", "limit"] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Authentication
jsonwebtoken = "9"
argon2 = "0.5"

# Rate limiting
governor = "0.6"

# Database
deadpool-postgres = "0.14"
tokio-postgres = { version = "0.7", features = ["with-chrono-0_4", "with-serde_json-1", "with-uuid-1"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Error handling
anyhow = "1"
thiserror = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# UUID for API keys
uuid = { version = "1", features = ["v4", "serde"] }

# Environment
dotenvy = "0.15"

# WebSocket
futures-util = "0.3"

# URL encoding
urlencoding = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
