[package]
name = "metrics-rs"
version = "1.0.0"
edition = "2021"
authors = ["AI Foundation Team"]
description = "High-performance metrics collection and analysis for AI tools"

[[bin]]
name = "metrics-cli"
path = "src/bin/metrics-cli.rs"

[dependencies]
clap = { version = "4.4", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1.35", features = ["full"] }
tokio-postgres = { version = "0.7", features = ["with-serde_json-1", "with-chrono-0_4"] }
deadpool-postgres = "0.12"
uuid = { version = "1.6", features = ["v4", "serde"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
