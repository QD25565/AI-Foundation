[package]
name = "deep-net"
version = "0.2.0"
edition = "2021"
description = "Deep Net v2 - 3D Cyberspace for AI-Foundation (Bevy)"

[dependencies]
# Game Engine
bevy = "0.14"

# Networking - for multiplayer
bevy_renet = "0.0.12"
renet = "0.0.16"

# Database - connect to AI-Foundation PostgreSQL
tokio-postgres = { version = "0.7", features = ["with-serde_json-1"] }
deadpool-postgres = "0.14"

# HTTP client - connect to hybrid-server
reqwest = { version = "0.12", features = ["json"] }

# System info - hardware visualization
sysinfo = "0.31"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# Math
glam = "0.28"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Config
toml = "0.8"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = 3
lto = "thin"
