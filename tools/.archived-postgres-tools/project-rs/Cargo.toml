[package]
name = "project-rs"
version = "0.1.0"
edition = "2021"
description = "Project System CLI - manage projects and features for context injection"

[[bin]]
name = "project-cli"
path = "src/bin/project-cli.rs"

[dependencies]
# CLI
clap = { version = "4.5", features = ["derive"] }

# PostgreSQL (sync for simplicity)
postgres = { version = "0.19", features = ["with-chrono-0_4", "with-serde_json-1"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# Error handling
anyhow = "1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
