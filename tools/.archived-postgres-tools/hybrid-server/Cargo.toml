[package]
name = "hybrid-server"
version = "0.2.0"
edition = "2021"
authors = ["AI Foundation Team"]
license = "MIT"
description = "Enterprise-grade dual-transport server for AI Foundation awareness system"

[[bin]]
name = "hybrid-server"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1.41", features = ["full", "tracing"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# PostgreSQL with connection pooling
tokio-postgres = { version = "0.7", features = ["with-chrono-0_4"] }
deadpool-postgres = "0.14"

# Error handling
anyhow = "1.0"

# Metrics
metrics = "0.24"
metrics-exporter-prometheus = "0.15"

# DateTime
chrono = { version = "0.4", features = ["serde"] }

# Axum for HTTP server (with WebSocket support)
axum = { version = "0.7", features = ["ws"] }
bytes = "1.5"
tower = "0.4"
tower-http = { version = "0.5", features = ["compression-gzip", "trace"] }

# Hyper
hyper = { version = "1.0", features = ["full"] }
hyper-util = { version = "0.1", features = ["tokio"] }

# MessagePack
rmp-serde = "1.1"

# WebSocket streaming
futures-util = { version = "0.3", default-features = false, features = ["sink", "std"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
