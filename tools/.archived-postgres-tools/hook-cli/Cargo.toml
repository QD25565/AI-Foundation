[package]
name = "hook-cli"
version = "0.3.0"
edition = "2021"
description = "PostToolUse hook with full Python parity - PostgreSQL logging, ID-based dedup, analytics"

[[bin]]
name = "hook-cli"
path = "src/main.rs"

[dependencies]
# Minimal deps for fast startup
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }

# PostgreSQL for full Python parity (log file actions, analytics, query awareness)
postgres = "0.19"

# Shared memory still available as fallback
shm_rs = { path = "../shm-rs", package = "shm-rs" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
