[package]
name = "stigmergy-rs"
version = "0.1.0"
edition = "2021"

[lib]
name = "stigmergy_core"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "stigmergy-daemon"
path = "src/bin/daemon.rs"

[dependencies]
# Async runtime
tokio = { version = "1.40", features = ["full"] }

# PostgreSQL with connection pooling
tokio-postgres = { version = "0.7", features = ["with-chrono-0_4"] }
deadpool-postgres = "0.14"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Date/Time
chrono = { version = "0.4", features = ["serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Python bindings
pyo3 = { version = "0.22", features = ["extension-module", "chrono", "anyhow"] }

[dev-dependencies]
tokio-test = "0.4"
