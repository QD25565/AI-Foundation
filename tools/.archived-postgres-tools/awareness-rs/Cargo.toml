[package]
name = "awareness-core"
version = "0.1.0"
edition = "2021"
authors = ["AI Foundation Team"]
description = "High-performance awareness and file tracking system for multi-AI coordination"

[lib]
name = "awareness_core"
crate-type = ["cdylib", "rlib"]  # Python extension + Rust library

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Database
tokio-postgres = { version = "0.7", features = ["with-chrono-0_4"] }
deadpool-postgres = "0.12"

# Redis (for caching)
redis = { version = "0.24", features = ["tokio-comp", "connection-manager"] }
deadpool-redis = "0.14"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Python bindings
pyo3 = { version = "0.22", features = ["extension-module", "chrono"], optional = true }

# Environment variables
dotenvy = "0.15"

# Lazy static initialization
once_cell = "1.19"

# CLI argument parsing
clap = { version = "4.5", features = ["derive"] }

[features]
default = ["python"]
python = ["pyo3"]
